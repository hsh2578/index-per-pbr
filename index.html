<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지수 PER · PBR 대시보드</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css?v=8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
<header>
  <div>
    <h1>지수 PER · PBR · 시가총액 대시보드</h1>
    <p class="updated">최근 갱신 <span id="updated">-</span> · 기간 최근 10년</p>
  </div>
</header>

<nav class="tabs">
  <button class="tab" data-mode="kospi"><span class="dot" style="background:#2563eb"></span>KOSPI</button>
  <button class="tab" data-mode="kosdaq"><span class="dot" style="background:#059669"></span>KOSDAQ</button>
  <button class="tab" data-mode="sp500"><span class="dot" style="background:#dc2626"></span>S&amp;P 500</button>
  <button class="tab" data-mode="nasdaq"><span class="dot" style="background:#7c3aed"></span>NASDAQ 종합</button>
  <button class="tab is-active" data-mode="compare">비교</button>
</nav>

<section class="stock-strip" id="stock-strip">
  <h2>종목 페이지</h2>
  <div class="stock-cards" id="stock-cards"></div>
</section>

<main>
  <aside class="sidebar">
    <div id="panel-compare" class="mode-panel">
      <h2>지수 선택</h2>
      <label><span class="dot" style="background:#2563eb"></span><input type="checkbox" data-key="kospi" checked> KOSPI</label>
      <label><span class="dot" style="background:#059669"></span><input type="checkbox" data-key="kosdaq" checked> KOSDAQ</label>
      <label><span class="dot" style="background:#dc2626"></span><input type="checkbox" data-key="sp500" checked> S&amp;P 500</label>
      <label><span class="dot" style="background:#7c3aed"></span><input type="checkbox" data-key="nasdaq" checked> NASDAQ 종합</label>
    </div>

    <h2>표시</h2>
    <label><input type="checkbox" id="opt-band" checked> 평균 ±1σ 밴드</label>
    <label><input type="checkbox" id="opt-mean" checked> 평균선</label>
    <label><input type="checkbox" id="opt-norm"> 종가 100 정규화</label>

    <h2>기간</h2>
    <select id="opt-period">
      <option value="10">10년</option>
      <option value="5">5년</option>
      <option value="3">3년</option>
      <option value="1">1년</option>
    </select>

    <h2 id="summary-title">현재 PER 요약</h2>
    <div id="summary"></div>

    <p class="note" id="note"></p>
  </aside>

  <section class="charts">
    <div class="chart-card" data-metric="per">
      <h3>PER (주가수익비율)</h3>
      <div id="chart-per"></div>
    </div>
    <div class="chart-card" data-metric="pbr">
      <h3>PBR (주가순자산비율)</h3>
      <div id="chart-pbr"></div>
    </div>
    <div class="chart-card" data-metric="div_yield">
      <h3>배당수익률 (%)</h3>
      <div id="chart-div"></div>
    </div>
    <div class="chart-card" data-metric="close">
      <h3>지수 종가</h3>
      <div id="chart-close"></div>
    </div>
  </section>
</main>

<script src="app.js?v=7"></script>
</body>
</html>
