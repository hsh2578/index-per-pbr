<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>종목 PER · PBR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="style.css?v=6">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
<header>
  <div>
    <h1 id="stock-title">종목 PER · PBR</h1>
    <p class="updated">최근 갱신 <span id="updated">-</span> · <a href="index.html" style="color:#2563eb;text-decoration:none">← 지수 대시보드</a></p>
  </div>
</header>

<main>
  <aside class="sidebar">
    <h2>표시</h2>
    <label><input type="checkbox" id="opt-band" checked> 평균 ±1σ 밴드</label>
    <label><input type="checkbox" id="opt-mean" checked> 평균선</label>

    <h2>기간</h2>
    <select id="opt-period">
      <option value="10">10년</option>
      <option value="5" selected>5년</option>
      <option value="3">3년</option>
      <option value="1">1년</option>
    </select>

    <h2 id="summary-title">통계 + 컨센서스</h2>
    <div id="summary"></div>

    <p class="note" id="note"></p>
    <p class="note" style="color:#dc2626;margin-top:6px">
      ─ ─ ─ TTM 평균선 &nbsp;·&nbsp;
      <span style="border-bottom:2px dotted #dc2626;padding:0 2px">···</span>
      Forward (네이버 컨센서스)
    </p>
  </aside>

  <section class="charts">
    <div class="chart-card" data-metric="per">
      <h3>PER (주가수익비율)</h3>
      <div id="chart-per"></div>
    </div>
    <div class="chart-card" data-metric="pbr">
      <h3>PBR (주가순자산비율)</h3>
      <div id="chart-pbr"></div>
    </div>
    <div class="chart-card" data-metric="market_cap">
      <h3>시가총액</h3>
      <div id="chart-cap"></div>
    </div>
    <div class="chart-card" data-metric="close">
      <h3>주가 (종가)</h3>
      <div id="chart-close"></div>
    </div>
  </section>
</main>

<script src="stock.js?v=2"></script>
</body>
</html>
